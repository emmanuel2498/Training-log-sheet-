<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
</head>
<body style="background:#080810;color:#dde1f0;font-family:Arial;padding:20px">
<h2 style="color:#22c55e">Step 1: HTML loaded OK</h2>
<div id="out"></div>
<script>
var out = document.getElementById('out');
out.innerHTML += '<p style="color:#3b82f6">Step 2: Script running OK</p>';
try {
  localStorage.setItem('t','1');
  out.innerHTML += '<p style="color:#3b82f6">Step 3: LocalStorage OK</p>';
} catch(e) {
  out.innerHTML += '<p style="color:#ef4444">Step 3: LocalStorage FAILED - ' + e.message + '</p>';
}
try {
  var d = new Date().toISOString().slice(0,10);
  out.innerHTML += '<p style="color:#3b82f6">Step 4: Date OK - ' + d + '</p>';
} catch(e) {
  out.innerHTML += '<p style="color:#ef4444">Step 4: Date FAILED - ' + e.message + '</p>';
}
out.innerHTML += '<p style="color:#22c55e;font-size:18px;font-weight:bold">All tests passed - ready to load full app</p>';
</script>
</body>
</html>
